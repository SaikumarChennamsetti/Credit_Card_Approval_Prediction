<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - CredAI</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="glow-bg">
        <div class="glow-1"></div>
        <div class="glow-2"></div>
    </div>

    <div class="loading-overlay" id="loading-overlay" aria-hidden="true" role="dialog" aria-modal="true" aria-label="Loading request">
        <div class="spinner-container">
            <div class="spinner" role="status" aria-label="Loading spinner"></div>
            <p class="spinner-message">Processing request...</p>
        </div>
    </div>

    <div class="container" style="max-width: 480px; padding-bottom: 40px;">
        <div class="text-center" style="margin-bottom: 24px; padding-top: 60px;">
            <a href="/" class="nav-logo" aria-label="CredAI Home" style="display: inline-flex; justify-content: center; align-items: center; text-decoration: none; font-size: 2.2rem; gap: 8px;">
                <i class="fa-solid fa-credit-card logo-icon" style="color: var(--primary);" aria-hidden="true"></i>
                <span class="logo-text" style="font-family: 'Outfit', sans-serif; font-weight: 800; color: var(--text-primary); letter-spacing: -0.5px;">Cred<span class="accent-text" style="color: var(--primary);">AI</span></span>
            </a>
        </div>

        <div class="text-center" style="margin-bottom: 30px;">
            <h1 class="section-title" style="font-size: 2rem; margin-bottom: 8px;">Welcome Back</h1>
            <p class="text-muted" style="font-size: 0.95rem;">Authenticate to access the CredAI prediction scoring engine.</p>
        </div>

        <div class="card glass-card auth-card" style="padding: 32px; box-shadow: var(--shadow-xl);">
            <h3 class="form-section-title" style="margin-bottom: 24px; font-size: 1.2rem; display: flex; align-items: center; gap: 10px;">
                <i class="fa-solid fa-lock" style="color: var(--primary);"></i> Account Sign In
            </h3>

            <form id="login-form" novalidate>
                <div class="form-group">
                    <label for="username_or_email" class="form-label">Username or Email <span class="required">*</span></label>
                    <input type="text" id="username_or_email" class="form-input" placeholder="Enter username or email address" required>
                    <span class="error-message" id="error-username_or_email"></span>
                </div>

                <div class="form-group" style="position: relative;">
                    <div class="flex-between">
                        <label for="password" class="form-label">Password <span class="required">*</span></label>
                        <a href="#" id="forgot-password-link" class="text-muted" style="font-size: 0.8rem; text-decoration: none; margin-bottom: 6px;" onclick="showNotification('Password recovery is not configured in this demo version.', 'info')">Forgot Password?</a>
                    </div>
                    <div style="position: relative; width: 100%;">
                        <input type="password" id="password" class="form-input" placeholder="••••••••" style="padding-right: 46px;" required>
                        <button type="button" class="pwd-toggle-btn" onclick="togglePasswordVisibility('password', this)" aria-label="Toggle Password Visibility">
                            <i class="fa-solid fa-eye"></i>
                        </button>
                    </div>
                    <span class="error-message" id="error-password"></span>
                </div>

                <div class="form-group flex-between" style="margin: 20px 0;">
                    <label class="flex-center" style="gap: 8px; cursor: pointer; color: var(--text-muted); font-size: 0.9rem; user-select: none;">
                        <input type="checkbox" id="remember_me" style="accent-color: var(--primary); width: 16px; height: 16px; border-radius: var(--radius-sm);">
                        Remember Me
                    </label>
                </div>

                <button type="submit" class="btn btn-primary btn-block" style="width: 100%; margin-top: 10px;" id="login-submit-btn">
                    <i class="fa-solid fa-right-to-bracket"></i> Sign In
                </button>
            </form>

            <div class="text-center" style="margin-top: 24px; border-top: 1px solid var(--border-glass); padding-top: 20px;">
                <p class="text-muted" style="font-size: 0.9rem;">
                    Don't have an account? <a href="/signup" style="color: var(--primary); font-weight: 600; text-decoration: none;">Create Account</a>
                </p>
            </div>
        </div>
    </div>

    <div class="toast-container" id="toast-container" aria-live="polite"></div>

    <footer class="footer-wrapper" style="border: none; background: transparent; padding: 24px 0 40px; margin: 0; box-shadow: none;">
        <div class="footer-bottom text-center">
            <p>&copy; 2026 Saikumar Chennamsetti. All Rights Reserved.</p>
        </div>
    </footer>

    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
    <script>
    function togglePasswordVisibility(fieldId, button) {
        const input = document.getElementById(fieldId);
        const icon = button.querySelector('i');
        if (input.type === 'password') {
            input.type = 'text';
            icon.classList.remove('fa-eye');
            icon.classList.add('fa-eye-slash');
        } else {
            input.type = 'password';
            icon.classList.remove('fa-eye-slash');
            icon.classList.add('fa-eye');
        }
    }

    document.addEventListener('DOMContentLoaded', () => {
        const form = document.getElementById('login-form');
        const submitBtn = document.getElementById('login-submit-btn');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const usernameOrEmailEl = document.getElementById('username_or_email');
            const passwordEl = document.getElementById('password');
            const rememberMeEl = document.getElementById('remember_me');

            let isValid = true;

            // Reset errors
            [usernameOrEmailEl, passwordEl].forEach(el => {
                el.classList.remove('input-error');
                const err = document.getElementById(`error-${el.id}`);
                if (err) err.textContent = "";
            });

            if (usernameOrEmailEl.value.trim() === "") {
                usernameOrEmailEl.classList.add('input-error');
                document.getElementById('error-username_or_email').textContent = "Username or email is required.";
                isValid = false;
            }

            if (passwordEl.value === "") {
                passwordEl.classList.add('input-error');
                document.getElementById('error-password').textContent = "Password is required.";
                isValid = false;
            }

            if (!isValid) return;

            // Show spinner / loading overlay
            LoadingOverlay.show("Verifying credentials...");
            submitBtn.disabled = true;

            try {
                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        username_or_email: usernameOrEmailEl.value.trim(),
                        password: passwordEl.value,
                        remember_me: rememberMeEl.checked
                    })
                });

                const res = await response.json();

                if (response.ok && res.success) {
                    showNotification("Logged in successfully. Redirecting...", "success");
                    setTimeout(() => {
                        window.location.href = '/';
                    }, 1000);
                } else {
                    showNotification(res.message || "Invalid credentials.", "error");
                    submitBtn.disabled = false;
                    LoadingOverlay.hide();
                }
            } catch (err) {
                console.error(err);
                showNotification("Failed to connect to backend server.", "error");
                submitBtn.disabled = false;
                LoadingOverlay.hide();
            }
        });
    });
    </script>
</body>
</html>
