<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - CredAI</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="glow-bg">
        <div class="glow-1"></div>
        <div class="glow-2"></div>
    </div>

    <div class="loading-overlay" id="loading-overlay" aria-hidden="true" role="dialog" aria-modal="true" aria-label="Loading request">
        <div class="spinner-container">
            <div class="spinner" role="status" aria-label="Loading spinner"></div>
            <p class="spinner-message">Processing request...</p>
        </div>
    </div>

    <div class="container" style="max-width: 540px; padding-bottom: 40px;">
        <div class="text-center" style="margin-bottom: 24px; padding-top: 60px;">
            <a href="/" class="nav-logo" aria-label="CredAI Home" style="display: inline-flex; justify-content: center; align-items: center; text-decoration: none; font-size: 2.2rem; gap: 8px;">
                <i class="fa-solid fa-credit-card logo-icon" style="color: var(--primary);" aria-hidden="true"></i>
                <span class="logo-text" style="font-family: 'Outfit', sans-serif; font-weight: 800; color: var(--text-primary); letter-spacing: -0.5px;">Cred<span class="accent-text" style="color: var(--primary);">AI</span></span>
            </a>
        </div>

        <div class="text-center" style="margin-bottom: 30px;">
            <h1 class="section-title" style="font-size: 2rem; margin-bottom: 8px;">Create Account</h1>
            <p class="text-muted" style="font-size: 0.95rem;">Register to evaluate card applicant records and track logs private to you.</p>
        </div>

        <div class="card glass-card auth-card" style="padding: 32px; box-shadow: var(--shadow-xl);">
            <h3 class="form-section-title" style="margin-bottom: 24px; font-size: 1.2rem; display: flex; align-items: center; gap: 10px;">
                <i class="fa-solid fa-user-plus" style="color: var(--primary);"></i> User Registration
            </h3>

            <form id="signup-form" novalidate>
                <div class="form-group">
                    <label for="full_name" class="form-label">Full Name <span class="required">*</span></label>
                    <input type="text" id="full_name" class="form-input" placeholder="e.g. John Doe" required>
                    <span class="error-message" id="error-full_name"></span>
                </div>

                <div class="form-group">
                    <label for="email" class="form-label">Email Address <span class="required">*</span></label>
                    <input type="email" id="email" class="form-input" placeholder="name@company.com" required>
                    <span class="error-message" id="error-email"></span>
                </div>

                <div class="form-group">
                    <label for="mobile" class="form-label">Mobile Number (Optional)</label>
                    <input type="tel" id="mobile" class="form-input" placeholder="e.g. +1 (555) 019-2834">
                    <span class="error-message" id="error-mobile"></span>
                </div>

                <div class="form-group">
                    <label for="username" class="form-label">Username <span class="required">*</span></label>
                    <input type="text" id="username" class="form-input" placeholder="e.g. johndoe" required>
                    <span class="error-message" id="error-username"></span>
                </div>

                <div class="form-grid">
                    <div class="form-group" style="position: relative;">
                        <label for="password" class="form-label">Password <span class="required">*</span></label>
                        <div style="position: relative; width: 100%;">
                            <input type="password" id="password" class="form-input" placeholder="••••••••" style="padding-right: 46px;" required>
                            <button type="button" class="pwd-toggle-btn" onclick="togglePasswordVisibility('password', this)" aria-label="Toggle Password Visibility">
                                <i class="fa-solid fa-eye"></i>
                            </button>
                        </div>
                        <span class="error-message" id="error-password"></span>
                    </div>

                    <div class="form-group" style="position: relative;">
                        <label for="confirm_password" class="form-label">Confirm Password <span class="required">*</span></label>
                        <div style="position: relative; width: 100%;">
                            <input type="password" id="confirm_password" class="form-input" placeholder="••••••••" style="padding-right: 46px;" required>
                            <button type="button" class="pwd-toggle-btn" onclick="togglePasswordVisibility('confirm_password', this)" aria-label="Toggle Password Visibility">
                                <i class="fa-solid fa-eye"></i>
                            </button>
                        </div>
                        <span class="error-message" id="error-confirm_password"></span>
                    </div>
                </div>

                <button type="submit" class="btn btn-primary btn-block" style="width: 100%; margin-top: 15px;" id="signup-submit-btn">
                    <i class="fa-solid fa-user-plus"></i> Create Account
                </button>
            </form>

            <div class="text-center" style="margin-top: 24px; border-top: 1px solid var(--border-glass); padding-top: 20px;">
                <p class="text-muted" style="font-size: 0.9rem;">
                    Already have an account? <a href="/login" style="color: var(--primary); font-weight: 600; text-decoration: none;">Sign In</a>
                </p>
            </div>
        </div>
    </div>

    <div class="toast-container" id="toast-container" aria-live="polite"></div>

    <footer class="footer-wrapper" style="border: none; background: transparent; padding: 24px 0 40px; margin: 0; box-shadow: none;">
        <div class="footer-bottom text-center">
            <p>&copy; 2026 Saikumar Chennamsetti. All Rights Reserved.</p>
        </div>
    </footer>

    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
    <script>
    function togglePasswordVisibility(fieldId, button) {
        const input = document.getElementById(fieldId);
        const icon = button.querySelector('i');
        if (input.type === 'password') {
            input.type = 'text';
            icon.classList.remove('fa-eye');
            icon.classList.add('fa-eye-slash');
        } else {
            input.type = 'password';
            icon.classList.remove('fa-eye-slash');
            icon.classList.add('fa-eye');
        }
    }

    document.addEventListener('DOMContentLoaded', () => {
        const form = document.getElementById('signup-form');
        const submitBtn = document.getElementById('signup-submit-btn');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const fullNameEl = document.getElementById('full_name');
            const emailEl = document.getElementById('email');
            const mobileEl = document.getElementById('mobile');
            const usernameEl = document.getElementById('username');
            const passwordEl = document.getElementById('password');
            const confirmPasswordEl = document.getElementById('confirm_password');

            let isValid = true;

            // Reset errors
            [fullNameEl, emailEl, mobileEl, usernameEl, passwordEl, confirmPasswordEl].forEach(el => {
                el.classList.remove('input-error');
                const err = document.getElementById(`error-${el.id}`);
                if (err) err.textContent = "";
            });

            // Basic validations
            if (fullNameEl.value.trim() === "") {
                fullNameEl.classList.add('input-error');
                document.getElementById('error-full_name').textContent = "Full name is required.";
                isValid = false;
            }

            if (emailEl.value.trim() === "") {
                emailEl.classList.add('input-error');
                document.getElementById('error-email').textContent = "Email address is required.";
                isValid = false;
            } else {
                // Regex match
                const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
                if (!emailRegex.test(emailEl.value.trim())) {
                    emailEl.classList.add('input-error');
                    document.getElementById('error-email').textContent = "Please enter a valid email address.";
                    isValid = false;
                }
            }

            if (usernameEl.value.trim() === "") {
                usernameEl.classList.add('input-error');
                document.getElementById('error-username').textContent = "Username is required.";
                isValid = false;
            }

            if (passwordEl.value === "") {
                passwordEl.classList.add('input-error');
                document.getElementById('error-password').textContent = "Password is required.";
                isValid = false;
            } else if (passwordEl.value.length < 6) {
                passwordEl.classList.add('input-error');
                document.getElementById('error-password').textContent = "Password must be at least 6 characters.";
                isValid = false;
            }

            if (confirmPasswordEl.value === "") {
                confirmPasswordEl.classList.add('input-error');
                document.getElementById('error-confirm_password').textContent = "Please confirm your password.";
                isValid = false;
            } else if (passwordEl.value !== confirmPasswordEl.value) {
                confirmPasswordEl.classList.add('input-error');
                document.getElementById('error-confirm_password').textContent = "Passwords do not match.";
                isValid = false;
            }

            if (!isValid) return;

            // Show spinner / loading overlay
            LoadingOverlay.show("Creating user account...");
            submitBtn.disabled = true;

            try {
                const response = await fetch('/api/signup', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        full_name: fullNameEl.value.trim(),
                        email: emailEl.value.trim(),
                        mobile: mobileEl.value.trim(),
                        username: usernameEl.value.trim(),
                        password: passwordEl.value,
                        confirm_password: confirmPasswordEl.value
                    })
                });

                const res = await response.json();

                if (response.ok && res.success) {
                    showNotification("Account created successfully! Redirecting to login...", "success");
                    setTimeout(() => {
                        window.location.href = '/login';
                    }, 1500);
                } else {
                    showNotification(res.message || "Failed to create account.", "error");
                    submitBtn.disabled = false;
                    LoadingOverlay.hide();
                }
            } catch (err) {
                console.error(err);
                showNotification("Failed to connect to backend server.", "error");
                submitBtn.disabled = false;
                LoadingOverlay.hide();
            }
        });
    });
    </script>
</body>
</html>
